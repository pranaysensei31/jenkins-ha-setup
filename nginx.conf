events {}

http {

 upstream jenkins_cluster {
     server jenkins-master:8080 max_fails=3 fail_timeout=10s;
     server jenkins-backup:8080 backup;
 }

 server {
     listen 80;

     location / {
         proxy_pass http://jenkins_cluster;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
     }

 }

}