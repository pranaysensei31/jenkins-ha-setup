services:

  jenkins-master:
    image: jenkins/jenkins:lts
    container_name: jenkins_master
    restart: always
    ports:
      - "8081:8080"
    volumes:
      - jenkins_data:/var/jenkins_home

  jenkins-backup:
    image: jenkins/jenkins:lts
    container_name: jenkins_backup
    restart: always
    ports:
      - "8082:8080"
    volumes:
      - jenkins_data:/var/jenkins_home

  nginx:
    image: nginx:latest
    container_name: jenkins_lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - jenkins-master
      - jenkins-backup

volumes:
  jenkins_data: